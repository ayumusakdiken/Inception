name: inception

services:
  nginx:
    container_name: nginx
    build: ./requirements/nginx/
    depends_on:
      - mariadb
    ports:
      - "443:443"
    volumes:
      - wordpress_data:/var/www/html/
    env_file:
      - .env
    networks:
      - wp_network
  wordpress:
    container_name: wordpress
    build: requirements/wordpress/
    depends_on:
      - nginx
      - mariadb
    volumes:
      - wordpress_data:/var/www/html/
    env_file:
      - .env
    networks:
      - wp_network
  mariadb:
    container_name: mariadb
    build: requirements/mariadb/
    volumes:
      - db:/var/lib/mysql
    env_file:
      - .env
    networks:
      - wp_network

volumes:
    db:
      driver: local
    wordpress_data:
      driver: local
networks:
    wp_network:
      driver: bridge
